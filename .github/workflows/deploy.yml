name: Deploy to AWS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS CLI
      - name: Configure AWS CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $AWS_REGION

      # Login to Amazon ECR
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URI }}

      # Build and push Docker image
      - name: Build and push Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build -t gta-6-backend:$IMAGE_TAG .
          docker tag gta-6-backend:$IMAGE_TAG ${{ secrets.ECR_REPOSITORY_URI }}:$IMAGE_TAG
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:$IMAGE_TAG
        env:
          IMAGE_TAG: ${{ github.sha }}

      # Register new ECS Task Definition
      - name: Update ECS Task Definition
        run: |
          aws ecs register-task-definition \
            --family task-gta-6 \
            --container-definitions '[{
              "name": "gta-6",
              "image": "${{ secrets.ECR_REPOSITORY_URI }}:$IMAGE_TAG",
              "memory": 2048,
              "cpu": 1024,
              "portMappings": [
                {"containerPort": 5000, "hostPort": 5000, "protocol": "tcp"}
              ],
              "environment": [
                {"name": "DB_HOST", "value": "${{ secrets.RDS_HOST }}"},
                {"name": "DB_PORT", "value": "${{ secrets.RDS_PORT }}"},
                {"name": "DB_USER", "value": "${{ secrets.RDS_USER }}"},
                {"name": "DB_PASSWORD", "value": "${{ secrets.RDS_PASSWORD }}"},
                {"name": "DB_DATABASE", "value": "${{ secrets.RDS_DATABASE }}"}
              ]
            }]'
        env:
          IMAGE_TAG: ${{ github.sha }}

      # Update ECS Service
      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster demo-ecs \
            --service gta-6-service \
            --force-new-deployment
